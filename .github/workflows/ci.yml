name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest

    # 🔥 SET DEFAULT DIRECTORY (cleanest solution)
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # 🔥 Format check
      - name: Rust fmt
        run: cargo fmt --all -- --check

      # 🔥 Clippy strict
      - name: Clippy
        run: cargo clippy --all --all-targets -- -D warnings

      # 🔥 Build
      - name: Build
        run: cargo build --release

      # 🔥 Tests
      - name: Run tests
        run: cargo test --all