name: smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rwayve_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/rwayve_test
      JWT_SECRET: ci-secret
      AES_KEY: 0123456789abcdef0123456789abcdef
      MAILHOG_API: http://localhost:8025
      MAILHOG_SMTP_HOST: localhost
      MAILHOG_SMTP_PORT: "1025"
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Apply schema
        run: psql "$DATABASE_URL" -f infra/postgres/init.sql
        env:
          PGPASSWORD: postgres

      - name: cargo test
        working-directory: backend
        run: cargo test --no-fail-fast -- --test-threads=1

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: type-check
        run: npx tsc --noEmit

      - name: vitest
        run: npm test

  docker-smoke:
    runs-on: ubuntu-latest
    # Smoke depends on the unit/integration suites passing first.
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Generate .env files needed by docker-compose
        run: |
          # Backend .env (consumed by the backend service)
          cat <<EOF > backend/.env
          DATABASE_URL=postgres://postgres:postgres@postgres_db:5432/rwayve
          FRONTEND_URL=http://localhost
          JWT_SECRET=ci-secret
          AES_KEY=0123456789abcdef0123456789abcdef
          REDIS_URL=redis://redis:6379
          SMTP_HOST=smtp.example.com
          SMTP_PORT=587
          SMTP_USER=ci@example.com
          SMTP_PASS=ci-pass
          EOF

          # Centralized secrets — consumed by postgres_db + backend + workers
          # (docker-compose hard-fails if this env_file is missing).
          cat <<EOF > .env.secrets
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=rwayve
          POSTGRES_PORT=5432
          JWT_SECRET=ci-secret
          AES_KEY=0123456789abcdef0123456789abcdef
          SMTP_USER=ci@example.com
          SMTP_PASS=ci-pass
          EOF

          # Frontend .env baked into the build
          cat <<EOF > frontend/.env
          VITE_API_URL=http://localhost:8080
          EOF

          # Postgres credentials for compose (root .env)
          cat <<EOF > .env
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=rwayve
          EOF

          # client_secret.json placeholder (volume-mounted; backend won't crash on it)
          cat <<EOF > client_secret.json
          {"web":{"client_id":"ci","client_secret":"ci","redirect_uris":["http://localhost:8080/oauth/callback"]}}
          EOF

      - name: Run docker smoke
        run: ./scripts/smoke.sh

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --tail=200 || true
