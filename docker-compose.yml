
services:

  postgres_db:
    image: postgres:15
    environment:
      POSTGRES_DB: wayve_db
      POSTGRES_USER: wayve_user
      POSTGRES_PASSWORD: wayve_password
    ports:
      - "5432:5432"

  actix_api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - postgres_db
    environment:
      DATABASE_URL: postgres://wayve_user:wayve_password@postgres_db:5432/wayve_db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: react_frontend
    depends_on:
      - actix_api
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules

  nginx:
    container_name: nginx_server
    image: nginx:latest
    depends_on:
      - frontend
      - actix_api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf

volumes:
  postgres_data:
  node_modules:
