
services:

  postgres_db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  actix_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actix_api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 10
    depends_on:
      - postgres_db
    env_file:
      - .env
    volumes:
    - ./client_secret.json:/app/client_secret.json
    - ./uploads:/app/uploads
    - ./logs:/app/logs 
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    depends_on:
      - actix_api
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules

  nginx:
    container_name: nginx_server
    image: nginx:latest
    depends_on:
      - frontend
      - actix_api
    restart: always 
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf

volumes:
  postgres_data:
  node_modules:
