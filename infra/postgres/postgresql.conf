# 🔥 Memory (adjust based on container size)
shared_buffers = 256MB
work_mem = 8MB
maintenance_work_mem = 64MB

# 🔥 WAL (CRITICAL for your email sync)
wal_buffers = 16MB
max_wal_size = 1GB
min_wal_size = 256MB
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9

# 🔥 Connection handling
max_connections = 100

# 🔥 Parallelism
max_parallel_workers = 4
max_parallel_workers_per_gather = 2