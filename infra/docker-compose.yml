
services:

  postgres_db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - ../.env
    # environment:
    #   POSTGRES_DB: ${POSTGRES_DB}
    #   POSTGRES_USER: ${POSTGRES_USER}
    #   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    depends_on:
      - postgres_db
    env_file:
      - ../.env
    volumes:
      - ../client_secret.json:/app/client_secret.json
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 10

  frontend:
    build:
      context: ../frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:5173"

    # ⚠️ DEV ONLY
    # volumes:
    #   - ../frontend:/app
    #   - node_modules:/app/node_modules

  nginx:
    container_name: nginx_server
    image: nginx:latest
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf

volumes:
  postgres_data:
  node_modules: