services:
  postgres_db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    healthcheck:
      # $$ escapes the $ so compose doesn't interpolate from the host —
      # POSTGRES_USER comes from env_file and is expanded by the container shell.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # Test/dev SMTP catcher. Lives behind the `mail` profile so production
  # `docker compose up` ignores it. Used by:
  #   - the docker smoke script (scripts/smoke.sh) to verify forgot-password
  #     emails actually leave the backend
  #   - local devs who want to inspect outgoing mail at http://localhost:8025
  # Bring up explicitly with: `docker compose --profile mail up -d`
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    profiles: ["mail"]
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI / JSON API
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/api/v2/messages"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../backend/.env
    volumes:
      - ../client_secret.json:/app/client_secret.json
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:5173"
    env_file:
      - ../frontend/.env

  nginx:
    container_name: nginx_server
    image: nginx:latest
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf

volumes:
  postgres_data:
  redis_data:
