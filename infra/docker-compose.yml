version: "3.9"

services:
  postgres_db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    depends_on:
      - postgres_db
    env_file:
      - ../.env
    volumes:
      - ../client_secret.json:/app/client_secret.json
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:5173"

  nginx:
    container_name: nginx_server
    image: nginx:latest
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  node_modules:
  redis_data: