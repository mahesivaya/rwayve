name: rwayve_prod

services:
  postgres_db:
    image: postgres:15
    container_name: rwayve_postgres_prod
    env_file:
      - ../.env.production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: rwayve_redis_prod
    restart: always
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "allkeys-lru"
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_prod_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: rwayve-backend:prod
    container_name: rwayve_backend_prod
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../backend/.env.production
    environment:
      RWAYVE_ENV: production
      RWAYVE_ROLE: api
    volumes:
      - ../client_secret.json:/app/client_secret.json:ro
      - uploads_prod:/app/uploads
      - logs_prod:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  email_sync_worker:
    # Same image as backend (built once); RWAYVE_ROLE selects worker behaviour.
    image: rwayve-backend:prod
    container_name: rwayve_email_sync_worker_prod
    hostname: rwayve_email_sync_worker_prod
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - ../backend/.env.production
    environment:
      RWAYVE_ENV: production
      RWAYVE_ROLE: email-sync-worker
    volumes:
      - ../client_secret.json:/app/client_secret.json:ro
      - logs_prod:/app/logs

  email_body_worker:
    # Same image as backend (built once); RWAYVE_ROLE selects worker behaviour.
    image: rwayve-backend:prod
    container_name: rwayve_email_body_worker_prod
    hostname: rwayve_email_body_worker_prod
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - ../backend/.env.production
    environment:
      RWAYVE_ENV: production
      RWAYVE_ROLE: email-body-worker
    volumes:
      - ../client_secret.json:/app/client_secret.json:ro
      - uploads_prod:/app/uploads
      - logs_prod:/app/logs

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: "${VITE_API_URL:-}"
        VITE_WS_BASE_URL: "${VITE_WS_BASE_URL:-}"
    image: rwayve-frontend:prod
    container_name: rwayve_frontend_prod
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: rwayve_nginx_prod
    restart: always
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    env_file:
      - ./.env.production
    environment:
      CSP_CONNECT_SRC: "${CSP_CONNECT_SRC:-https://app.example.com wss://app.example.com}"
      NGINX_HOST: "${NGINX_HOST:-app.example.com}"
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_FILTER: "^(CSP_|NGINX_HOST)"
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - /dev/null:/etc/nginx/conf.d/default.conf

volumes:
  postgres_prod_data:
  redis_prod_data:
  uploads_prod:
  logs_prod:
