name: rwayve

services:
  postgres_db:
    image: postgres:15
    container_name: rwayve_postgres_dev
    env_file:
      - ../.env.development
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: rwayve_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_dev_data:/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: rwayve_mailhog_dev
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/api/v2/messages"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: rwayve-backend:dev
    container_name: rwayve_backend_dev
    restart: unless-stopped
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../backend/.env.development
    environment:
      RWAYVE_ENV: development
      RWAYVE_ROLE: api
      DATABASE_URL: postgres://wayve_user:wayve_password@postgres_db:5432/wayve_dev
      REDIS_URL: redis://redis:6379
      GOOGLE_CLIENT_SECRET_PATH: /app/client_secret.json
      SMTP_HOST: mailhog
    volumes:
      - ../client_secret.json:/app/client_secret.json:ro
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  email_sync_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: rwayve-email-sync-worker:dev
    container_name: rwayve_email_sync_worker_dev
    hostname: rwayve_email_sync_worker_dev
    restart: unless-stopped
    profiles: ["workers"]
    depends_on:
      postgres_db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - ../backend/.env.development
    environment:
      RWAYVE_ENV: development
      RWAYVE_ROLE: email-sync-worker
      DATABASE_URL: postgres://wayve_user:wayve_password@postgres_db:5432/wayve_dev
      REDIS_URL: redis://redis:6379
      GOOGLE_CLIENT_SECRET_PATH: /app/client_secret.json
      SMTP_HOST: mailhog
    volumes:
      - ../client_secret.json:/app/client_secret.json:ro
      - ../logs:/app/logs

  email_body_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: rwayve-email-body-worker:dev
    container_name: rwayve_email_body_worker_dev
    hostname: rwayve_email_body_worker_dev
    restart: unless-stopped
    profiles: ["workers"]
    depends_on:
      postgres_db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - ../backend/.env.development
    environment:
      RWAYVE_ENV: development
      RWAYVE_ROLE: email-body-worker
      DATABASE_URL: postgres://wayve_user:wayve_password@postgres_db:5432/wayve_dev
      REDIS_URL: redis://redis:6379
      GOOGLE_CLIENT_SECRET_PATH: /app/client_secret.json
      SMTP_HOST: mailhog
    volumes:
      - ../client_secret.json:/app/client_secret.json:ro
      - ../uploads:/app/uploads
      - ../logs:/app/logs

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    image: rwayve-frontend:dev
    container_name: rwayve_frontend_dev
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ../frontend/.env.development
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5173/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "3000:5173"

  nginx:
    image: nginx:1.27-alpine
    container_name: rwayve_nginx_dev
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file:
      - ./.env.development
    environment:
      CSP_CONNECT_SRC: "${CSP_CONNECT_SRC:-http://localhost:8080 http://127.0.0.1:8080}"
      NGINX_HOST: "${NGINX_HOST:-localhost}"
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_FILTER: "^(CSP_|NGINX_HOST)"
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - /dev/null:/etc/nginx/conf.d/default.conf

volumes:
  postgres_dev_data:
  redis_dev_data:
