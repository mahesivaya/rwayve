name: rwayve

services:
  postgres_db:
    image: postgres:15
    container_name: rwayve_postgres_dev
    env_file:
      - ../.env.secrets
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: rwayve_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "allkeys-lru"
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_dev_data:/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: rwayve_mailhog_dev
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/api/v2/messages"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: rwayve-backend:dev
    container_name: rwayve_backend_dev
    restart: unless-stopped
    depends_on:
      jaeger:
        condition: service_started
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../backend/.env.development
      - ../.env.secrets
    environment:
      RWAYVE_ENV: development
      RWAYVE_ROLE: api
      DATABASE_URL: postgres://${POSTGRES_USER:-wayve_user}:${POSTGRES_PASSWORD:-wayve_password}@postgres_db:5432/${POSTGRES_DB:-wayve_dev}
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SMTP_HOST: mailhog
    volumes:
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  email_sync_worker:
    # Same image as backend (built once); RWAYVE_ROLE selects worker behaviour.
    image: rwayve-backend:dev
    container_name: rwayve_email_sync_worker_dev
    hostname: rwayve_email_sync_worker_dev
    restart: unless-stopped
    profiles: ["workers"]
    depends_on:
      postgres_db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - ../backend/.env.development
      - ../.env.secrets
    environment:
      RWAYVE_ENV: development
      RWAYVE_ROLE: email-sync-worker
      DATABASE_URL: postgres://${POSTGRES_USER:-wayve_user}:${POSTGRES_PASSWORD:-wayve_password}@postgres_db:5432/${POSTGRES_DB:-wayve_dev}
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
    volumes:
      - ../logs:/app/logs

  email_body_worker:
    # Same image as backend (built once); RWAYVE_ROLE selects worker behaviour.
    image: rwayve-backend:dev
    container_name: rwayve_email_body_worker_dev
    hostname: rwayve_email_body_worker_dev
    restart: unless-stopped
    profiles: ["workers"]
    depends_on:
      postgres_db:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - ../backend/.env.development
      - ../.env.secrets
    environment:
      RWAYVE_ENV: development
      RWAYVE_ROLE: email-body-worker
      DATABASE_URL: postgres://${POSTGRES_USER:-wayve_user}:${POSTGRES_PASSWORD:-wayve_password}@postgres_db:5432/${POSTGRES_DB:-wayve_dev}
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
    volumes:
      - ../uploads:/app/uploads
      - ../logs:/app/logs

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    image: rwayve-frontend:dev
    container_name: rwayve_frontend_dev
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ../frontend/.env.development
    volumes:
      # Live-mount host source so Vite HMR picks up edits without a rebuild.
      - ../frontend:/app
      # Keep the image's Linux-built node_modules; don't let the host shadow it.
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5173/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "3000:5173"

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: rwayve_jaeger_dev
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:16686/"]
      interval: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: rwayve_nginx_dev
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file:
      - ./.env.development
    environment:
      CSP_CONNECT_SRC: "${CSP_CONNECT_SRC:-http://localhost:8080 http://127.0.0.1:8080}"
      NGINX_HOST: "${NGINX_HOST:-localhost}"
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_FILTER: "^(CSP_|NGINX_HOST)"
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - /dev/null:/etc/nginx/conf.d/default.conf

volumes:
  postgres_dev_data:
  redis_dev_data:
