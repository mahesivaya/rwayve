# 🚫 Disallow risky patterns
disallowed-methods = [
  { path = "core::option::Option::unwrap", allow-invalid = true },
  { path = "core::result::Result::expect", allow-invalid = true }
]

# 🔥 Force better code
too-many-arguments-threshold = 5
type-complexity-threshold = 200

# 👇 Optional but useful
cognitive-complexity-threshold = 30