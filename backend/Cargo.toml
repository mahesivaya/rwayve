[package]
name = "rwayve"
version = "0.1.0"
edition = "2024"

[dependencies]
actix = "0.13"
actix-web-actors = "4"
actix-web = "4"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.11", features = ["json"] }
sqlx = { version = "0.7", features = [
    "runtime-tokio",
    "postgres",
    "macros",
    "chrono"
] }
chrono = { version = "0.4", features = ["serde"] }
uuid = "1"
futures = "0.3.32"
once_cell = "1"
anyhow = "1"
actix-cors = "0.7"
bcrypt = "0.15"
jsonwebtoken = "9"
base64 = "0.21"